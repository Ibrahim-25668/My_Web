<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دليلك | اتصل بنا</title>
  <link rel="icon" href="assets/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/CSS/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    header,
    footer {
      background-color: #0d6efd;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: inline;
    }

    body {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .contact-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .contact-box {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 750px;
      padding: 2rem;
    }

    .nav-tabs .nav-link {
      border-radius: 10px 10px 0 0;
      color: #0d6efd;
      font-weight: 600;
    }

    .nav-tabs .nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }

    .tab-content {
      border: 2px solid #0d6efd;
      border-top: none;
      border-radius: 0 0 15px 15px;
      padding: 2rem;
    }

    .input-group-text {
      background: #0d6efd;
      color: white;
      border: none;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-primary,
    .btn-success {
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-primary:hover,
    .btn-success:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>
  <header class="py-3 text-center bg-primary text-white">
    <img src="assets/img/logo.png" alt="دليلك" style="height:80px; display:block; margin:0 auto;">
    <h1 class="mt-2">دليلك</h1>
  </header>

  <nav class="navbar navbar-expand-lg navbar-light bg-dark bg-gradient shadow p-1">
    <div class="container-fluid">
      <a class="navbar-brand text-light" href="index.html">الرئيسية</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
        aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <ul class="navbar-nav w-100 justify-content-around ps-5">
          <li class="nav-item pe-5 ps-3"><a href="events.html" class="navbar-brand nav-link active text-light">جميع
              الفعاليات</a></li>
          <li class="nav-item pe-5 ps-3"><a href="contact.html" class="navbar-brand nav-link active text-light">اتصل
              بنا</a></li>
          <li class="nav-item pe-5 ps-3"><a href="about.html" class="navbar-brand nav-link active text-light">حول
              الموقع</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- main start -->
  <main class="container-fluid my-5">
    <div class="contact-container">
      <div class="contact-box">
        <ul class="nav nav-tabs mb-3" id="contactTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="email-tab" data-bs-toggle="tab" data-bs-target="#email" type="button"
              role="tab">عبر البريد الإلكتروني <i class="bi bi-envelope-fill"></i></button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="phone-tab" data-bs-toggle="tab" data-bs-target="#phone" type="button"
              role="tab">عبر الهاتف <i class="bi bi-telephone-fill"></i></button>
          </li>
        </ul>

        <div class="tab-content" id="contactTabContent">

          <div class="tab-pane fade show active" id="email" role="tabpanel">
            <h4 class="mb-3 text-primary text-center">أرسل لنا رسالة عبر البريد الإلكتروني</h4>
            <form id="contactForm" novalidate>
              <div class="mb-3">
                <label for="name" class="form-label">الاسم</label>
                <input type="text" id="name" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">الرسالة</label>
                <textarea id="message" rows="4" class="form-control" required></textarea>
              </div>
              <div id="contactAlert"></div> <!-- مكان ظهور الرسائل -->
              <button type="submit" class="btn btn-primary">إرسال</button>
            </form>

          </div>

          <div class="tab-pane fade" id="phone" role="tabpanel">
            <h4 class="mb-3 text-primary text-center">تواصل معنا عبر الهاتف</h4>
            <form id="phoneForm">
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input id="phoneName" type="text" class="form-control" placeholder="الاسم الكامل" required>
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                <input id="phoneNumber" type="tel" class="form-control" placeholder="رقم الهاتف" required>
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-chat-dots-fill"></i></span>
                <textarea id="phoneMessage" class="form-control" rows="4" placeholder="ما هو سبب الاتصال؟"
                  required></textarea>
              </div>
              <div id="phoneAlert" style="display:none;"></div>
              <button type="submit" class="btn btn-success w-100"><i class="bi bi-telephone-outbound-fill"></i> طلب
                اتصال</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white py-1">
    <div class="d-flex justify-content-center align-items-center">
      <span class="me-3">جميع الحقوق محفوظة 2025 &copy;</span>
      <a href="https://instagram.com" target="_blank" class="text-white mx-2 fs-5"><i class="bi bi-instagram"></i></a>
      <a href="https://facebook.com" target="_blank" class="text-white mx-2 fs-5"><i class="bi bi-facebook"></i></a>
      <a href="https://t.me" target="_blank" class="text-white mx-2 fs-5"><i class="bi bi-telegram"></i></a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const alertBox = document.getElementById('contactAlert');

      function showAlert(type, text) {
        alertBox.innerHTML = `<div class="alert alert-${type} alert-dismissible" role="alert">
      ${text}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>`;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!name || !email || !message) {
        showAlert('danger', 'يرجى ملء جميع الحقول المطلوبة.');
        return;
      }
      if (!emailRegex.test(email)) {
        showAlert('danger', 'صيغة البريد الإلكتروني غير صحيحة.');
        return;
      }

      // هنا يمكنك إرسال البيانات عبر AJAX أو مجرد عرض رسالة نجاح (حسب متطلبات المشروع)
      showAlert('success', 'تم إرسال رسالتك بنجاح — شكرًا لتواصلك معنا!');
      this.reset();
    });
  </script>

</body>

</html>
